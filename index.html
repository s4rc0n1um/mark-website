        <!-- ================================================================
       CONTACT MODAL
       ================================================================ -->
        <div class="modal-backdrop" id="contactModal">
            <div class="modal" role="dialog" aria-labelledby="modalTitle" aria-modal="true">
                <button class="modal__close" id="contactClose" aria-label="Close contact form">
                    <svg viewBox="0 0 24 24" fill="none">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>
                    </svg>
                </button>
                <!-- EDIT: MODAL HEADING -->
                <h2 class="modal__title" id="modalTitle">Get in Touch</h2>
                <!-- EDIT: MODAL SUBTITLE -->
                <p class="modal__subtitle">Booking, press, collaborations, or just to say hello.</p>
                <!-- EDIT: CONTACT FORM — Connect to Formspree/Workers to send emails -->
                <form id="contactForm" action="#" method="POST">
                    <div class="form-group">
                        <label for="contactName">Name</label>
                        <input type="text" id="contactName" name="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="contactEmail">Email</label>
                        <input type="email" id="contactEmail" name="email" placeholder="you@example.com" required>
                    </div>
                    <div class="form-group">
                        <label for="contactSubject">Subject</label>
                        <input type="text" id="contactSubject" name="subject" placeholder="Booking, press, general inquiry…" required>
                    </div>
                    <div class="form-group">
                        <label for="contactMessage">Message</label>
                        <textarea id="contactMessage" name="message" placeholder="What's on your mind?" required></textarea>
                    </div>
                    <button type="submit" class="btn btn--primary form__submit">Send Message</button>
                </form>
                <div class="form__success" id="formSuccess">
                    <p>Message Sent</p>
                    <span>Thanks — I'll get back to you soon.</span>
                </div>
            </div>
        </div>
